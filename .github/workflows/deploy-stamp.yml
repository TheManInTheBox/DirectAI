# ============================================================================
# DirectAI — Deploy Regional Stamp
# Deploys the complete set of Azure resources for a DirectAI customer region.
#
# Each customer has their own Azure subscription. The workflow targets
# the customer's subscription via GitHub environment secrets.
#
# Auth: OIDC federated credentials (no stored secrets).
# SECURITY: Pin third-party actions to commit SHAs before going to production.
#           Run `npx pin-github-action .github/workflows/*.yml` to automate.
# Flow: validate → what-if → approval gate → deploy
# ============================================================================

name: Deploy Stamp

on:
  workflow_dispatch:
    inputs:
      customer_id:
        description: 'Customer ID — GUID from manifest, or "internal" for platform stamps'
        required: true
        type: string
        default: 'internal'
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod
      region:
        description: 'Azure region (e.g., eastus2, westus3)'
        required: true
        type: string
        default: 'eastus2'
      subdomain:
        description: 'Customer subdomain for agilecloud.ai (e.g., "acme" → acme.agilecloud.ai)'
        required: true
        type: string
        default: 'internal'

permissions:
  id-token: write # OIDC token for Azure login
  contents: read

env:
  BICEP_FILE: infra/main.bicep

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------

jobs:
  # ── Setup ─────────────────────────────────────────────────────────
  setup:
    name: Resolve Region
    runs-on: ubuntu-latest
    outputs:
      region_short: ${{ steps.map.outputs.region_short }}
      resource_group: ${{ steps.map.outputs.resource_group }}
      params_file: ${{ steps.map.outputs.params_file }}
    steps:
      - name: Map region to short name
        id: map
        shell: bash
        run: |
          declare -A REGION_MAP=(
            ["eastus2"]="eus2"
            ["westus3"]="wus3"
            ["southcentralus"]="scus"
            ["westus2"]="wus2"
            ["centralus"]="cus"
          )
          SHORT="${REGION_MAP[${{ inputs.region }}]}"
          if [[ -z "$SHORT" ]]; then
            echo "::error::Unknown region '${{ inputs.region }}'. Add it to REGION_MAP in this workflow."
            exit 1
          fi
          echo "region_short=${SHORT}" >> "$GITHUB_OUTPUT"
          echo "resource_group=rg-dai-${{ inputs.customer_id }}-${{ inputs.environment }}-${SHORT}" >> "$GITHUB_OUTPUT"
          echo "params_file=infra/environments/${{ inputs.customer_id }}.${{ inputs.environment }}.${SHORT}.bicepparam" >> "$GITHUB_OUTPUT"
  # -------------------------------------------------------------------------
  # 1. Validate — syntax check and preflight
  # -------------------------------------------------------------------------
  validate:
    name: Validate Bicep
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ inputs.customer_id }}-${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        uses: azure/cli@9f7ce6f37c31b777ec6c6b6d1dfe7db79f497956 # v2
        with:
          inlineScript: |
            az group create \
              --name "${{ needs.setup.outputs.resource_group }}" \
              --location "${{ inputs.region }}" \
              --tags "project=directai" "customer-id=${{ inputs.customer_id }}" "environment=${{ inputs.environment }}" "region=${{ needs.setup.outputs.region_short }}" "managed-by=bicep"

      - name: Validate template
        uses: azure/arm-deploy@a1361c2c2cd398621955b16ca32e01c65ea340f5 # v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ needs.setup.outputs.resource_group }}
          template: ${{ env.BICEP_FILE }}
          parameters: ${{ needs.setup.outputs.params_file }}
          deploymentMode: Validate
          failOnStdErr: true

  # -------------------------------------------------------------------------
  # 2. What-If — preview changes before applying
  # -------------------------------------------------------------------------
  what-if:
    name: What-If Analysis
    runs-on: ubuntu-latest
    needs: [setup, validate]
    environment: ${{ inputs.customer_id }}-${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run What-If
        uses: azure/arm-deploy@a1361c2c2cd398621955b16ca32e01c65ea340f5 # v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ needs.setup.outputs.resource_group }}
          template: ${{ env.BICEP_FILE }}
          parameters: ${{ needs.setup.outputs.params_file }}
          additionalArguments: --what-if
          failOnStdErr: false

  # -------------------------------------------------------------------------
  # 3. Deploy — apply changes (requires environment approval for prod)
  # -------------------------------------------------------------------------
  deploy:
    name: Deploy Stamp
    runs-on: ubuntu-latest
    needs: [setup, what-if]
    environment:
      name: ${{ inputs.customer_id }}-${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy stamp
        id: deploy
        uses: azure/arm-deploy@a1361c2c2cd398621955b16ca32e01c65ea340f5 # v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ needs.setup.outputs.resource_group }}
          template: ${{ env.BICEP_FILE }}
          parameters: ${{ needs.setup.outputs.params_file }}
          deploymentName: stamp-${{ inputs.customer_id }}-${{ needs.setup.outputs.region_short }}-${{ github.run_number }}
          failOnStdErr: true

      - name: Output summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<'SUMMARY'
          ## 🚀 Stamp Deployed

          | Resource | Value |
          |----------|-------|
          SUMMARY
          echo "| **Customer** | \`${{ inputs.customer_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | \`${{ inputs.region }}\` (\`${{ needs.setup.outputs.region_short }}\`) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Resource Group** | \`${{ needs.setup.outputs.resource_group }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **AKS Cluster** | \`${{ steps.deploy.outputs.aksName }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **AKS FQDN** | \`${{ steps.deploy.outputs.aksControlPlaneFqdn }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ACR** | \`${{ steps.deploy.outputs.acrLoginServer }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Storage** | \`${{ steps.deploy.outputs.storageAccountName }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Key Vault** | \`${{ steps.deploy.outputs.keyVaultUri }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Kubelet Identity** | \`${{ steps.deploy.outputs.kubeletIdentityClientId }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 DNS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Subdomain** | \`${{ inputs.subdomain }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **FQDN** | \`${{ inputs.subdomain }}.agilecloud.ai\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Endpoint** | \`https://${{ inputs.subdomain }}.agilecloud.ai\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat >> $GITHUB_STEP_SUMMARY <<'STEPS'
          ### 📋 Post-Deploy Checklist
          1. **Get AKS credentials:** `az aks get-credentials --resource-group <RG> --name <AKS>`
          2. **Install NGINX Ingress Controller:** `helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx -n ingress-nginx --create-namespace`
          3. **Install cert-manager:** `helm upgrade --install cert-manager jetstack/cert-manager -n cert-manager --create-namespace --set crds.enabled=true`
          4. **Apply ClusterIssuers:** `kubectl apply -f deploy/cluster-issuers.yaml`
          5. **Install NVIDIA device plugin:** `helm upgrade --install nvdp nvdp/nvidia-device-plugin -n nvidia-device-plugin --create-namespace`
          6. **Deploy Helm release:** `helm upgrade --install directai deploy/helm/directai -n directai --create-namespace -f deploy/helm/directai/values-<env>.yaml`
          7. **Create DNS A record** pointing the subdomain to the NGINX Ingress external IP in the platform DNS zone
          8. **Assign AcrPull** on platform ACR to the kubelet identity (if using shared ACR)
          STEPS
