# ============================================================================
# DirectAI — Deploy Platform Infrastructure
#
# Deploys centralized shared resources to the Operations subscription:
#   - Container Registry (ACR) — inference images
#   - Storage Account — pre-compiled engine cache
#   - Log Analytics Workspace — centralized monitoring
#   - Application Insights — distributed tracing
#   - Platform AKS (CPU-only) — web app, metering, webhooks
#   - Key Vault — Stripe keys, NextAuth secret, DB connection strings
#
# This workflow targets the OPERATIONS subscription (b03c9eb4-...) and is
# separate from customer stamp deployments (deploy-stamp.yml).
#
# After first deploy:
#   1. Note the ACR login server from outputs
#   2. Set vars.ACR_NAME and vars.ACR_LOGIN_SERVER on the `platform` environment
#   3. Update customer .bicepparam files with platformAcrLoginServer value
#
# Auth: OIDC federated credentials on the `platform` GitHub environment.
# ============================================================================

name: Deploy Platform

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Platform environment'
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev
      region:
        description: 'Azure region'
        required: true
        type: choice
        options:
          - eastus2
          - westus3
        default: eastus2
      region_short:
        description: 'Region short name'
        required: true
        type: choice
        options:
          - eus2
          - wus3
        default: eus2
      action:
        description: 'Deployment action'
        required: true
        type: choice
        options:
          - validate
          - what-if
          - deploy
        default: what-if

permissions:
  id-token: write
  contents: read

env:
  OPERATIONS_SUBSCRIPTION_ID: 'b03c9eb4-cddc-4987-9673-9ac44b9cc1d9'
  RESOURCE_GROUP: rg-dai-platform-${{ inputs.environment }}-${{ inputs.region_short }}
  TEMPLATE_FILE: infra/platform/main.bicep
  PARAMS_FILE: infra/platform/environments/platform.${{ inputs.environment }}.${{ inputs.region_short }}.bicepparam

jobs:
  # ── Validate ──────────────────────────────────────────────────────
  validate:
    name: Validate Template
    runs-on: ubuntu-latest
    environment: platform
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.PLATFORM_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PLATFORM_AZURE_TENANT_ID }}
          subscription-id: ${{ env.OPERATIONS_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "${{ env.RESOURCE_GROUP }}" \
            --location "${{ inputs.region }}" \
            --tags project=directai component=platform environment=${{ inputs.environment }} managed-by=bicep

      - name: Validate Bicep
        uses: azure/arm-deploy@a1361c2c2cd398621955b16ca32e01c65ea340f5 # v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ${{ env.TEMPLATE_FILE }}
          parameters: ${{ env.PARAMS_FILE }}
          deploymentMode: Validate
          failOnStdErr: true

  # ── What-If ───────────────────────────────────────────────────────
  what-if:
    name: What-If Preview
    needs: validate
    runs-on: ubuntu-latest
    environment: platform
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.PLATFORM_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PLATFORM_AZURE_TENANT_ID }}
          subscription-id: ${{ env.OPERATIONS_SUBSCRIPTION_ID }}

      - name: What-If
        uses: azure/arm-deploy@a1361c2c2cd398621955b16ca32e01c65ea340f5 # v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ${{ env.TEMPLATE_FILE }}
          parameters: ${{ env.PARAMS_FILE }}
          additionalArguments: --what-if
          failOnStdErr: false

  # ── Deploy ────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: what-if
    if: inputs.action == 'deploy'
    runs-on: ubuntu-latest
    environment: platform
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.PLATFORM_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PLATFORM_AZURE_TENANT_ID }}
          subscription-id: ${{ env.OPERATIONS_SUBSCRIPTION_ID }}

      - name: Deploy platform infrastructure
        id: deploy
        uses: azure/arm-deploy@a1361c2c2cd398621955b16ca32e01c65ea340f5 # v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ${{ env.TEMPLATE_FILE }}
          parameters: ${{ env.PARAMS_FILE }}
          deploymentName: platform-${{ inputs.environment }}-${{ inputs.region_short }}-${{ github.run_number }}
          failOnStdErr: true

      - name: Deployment summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ### ✅ Platform Infrastructure Deployed

          | Resource | Value |
          |----------|-------|
          | **Subscription** | \`${{ env.OPERATIONS_SUBSCRIPTION_ID }}\` |
          | **Resource Group** | \`${{ env.RESOURCE_GROUP }}\` |
          | **ACR Login Server** | \`${{ steps.deploy.outputs.acrLoginServer }}\` |
          | **ACR Name** | \`${{ steps.deploy.outputs.acrName }}\` |
          | **Storage Account** | \`${{ steps.deploy.outputs.storageAccountName }}\` |
          | **Log Analytics** | \`${{ steps.deploy.outputs.logAnalyticsWorkspaceId }}\` |
          | **App Insights** | _(connection string in output)_ |
          | **DNS Zone** | \`${{ steps.deploy.outputs.dnsZoneName }}\` |
          | **DNS Name Servers** | \`${{ steps.deploy.outputs.dnsZoneNameServers }}\` |
          | **Platform AKS** | \`${{ steps.deploy.outputs.platformAksName }}\` |
          | **Platform AKS FQDN** | \`${{ steps.deploy.outputs.platformAksControlPlaneFqdn }}\` |
          | **Platform Key Vault** | \`${{ steps.deploy.outputs.platformKeyVaultUri }}\` |
          | **Kubelet Principal** | \`${{ steps.deploy.outputs.platformKubeletIdentityPrincipalId }}\` |

          #### Next Steps
          1. Set \`vars.ACR_NAME\` = \`${{ steps.deploy.outputs.acrName }}\` on the \`platform\` GitHub environment
          2. Set \`vars.ACR_LOGIN_SERVER\` = \`${{ steps.deploy.outputs.acrLoginServer }}\` on the \`platform\` GitHub environment
          3. **Delegate DNS**: Update your domain registrar's NS records for \`${{ steps.deploy.outputs.dnsZoneName }}\` to: \`${{ steps.deploy.outputs.dnsZoneNameServers }}\`
          4. Update \`platformAcrLoginServer\` in customer \`.bicepparam\` files
          5. For each customer stamp kubelet identity, assign \`AcrPull\` on the platform ACR
          6. Get Platform AKS credentials: \`az aks get-credentials --resource-group ${{ env.RESOURCE_GROUP }} --name ${{ steps.deploy.outputs.platformAksName }}\`
          7. Install NGINX Ingress + cert-manager on Platform AKS
          EOF
