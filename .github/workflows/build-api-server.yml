# ============================================================================
# DirectAI — Build & Push API Server
# Builds the API server Docker image, pushes to ACR, and optionally deploys
# to the target AKS cluster via Helm.
#
# Triggers:
#   - Push to main that changes src/api-server/** or deploy/models/**
#   - Manual dispatch with optional deploy toggle
#
# Auth: OIDC federated credentials targeting the platform subscription.
# SECURITY: Pin third-party actions to commit SHAs before going to production.
#           Run `npx pin-github-action .github/workflows/*.yml` to automate.
# ============================================================================

name: Build API Server

on:
  push:
    branches: [main]
    paths:
      - 'src/api-server/**'
      - 'deploy/models/**'
      - 'deploy/helm/directai/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to AKS after build?'
        required: false
        type: boolean
        default: false
      customer_id:
        description: 'Customer ID for deploy target (e.g., "internal")'
        required: false
        type: string
        default: 'internal'
      environment:
        description: 'Target environment for deploy'
        required: false
        type: choice
        options:
          - dev
          - prod
        default: dev
      region_short:
        description: 'Region short name (e.g., eus2, wus3)'
        required: false
        type: string
        default: 'eus2'

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: api-server
  BUILD_CONTEXT: src/api-server

jobs:
  # ── Lint & Test ──────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: src/api-server/pyproject.toml

      - name: Install dependencies
        working-directory: src/api-server
        run: pip install -e ".[dev]"

      - name: Lint
        working-directory: src/api-server
        run: ruff check app/ tests/

      - name: Test
        working-directory: src/api-server
        run: python -m pytest tests/ -v

  # ── Helm Lint & Template Validation ────────────────────────────────
  helm-validate:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Helm lint
        run: helm lint deploy/helm/directai --values deploy/helm/directai/ci/test-values.yaml --strict

      - name: Helm template (dry-run render)
        run: |
          helm template directai deploy/helm/directai \
            --values deploy/helm/directai/ci/test-values.yaml \
            --namespace directai > /tmp/rendered.yaml
          echo "Rendered $(wc -l < /tmp/rendered.yaml) lines of YAML"
          echo "### ✅ Helm template rendered successfully" >> $GITHUB_STEP_SUMMARY

      - name: Validate rendered YAML
        run: |
          # Check that key resources are present in rendered output
          for RESOURCE in Deployment Service ScaledObject DaemonSet Ingress ServiceAccount ConfigMap NetworkPolicy; do
            if grep -q "kind: ${RESOURCE}" /tmp/rendered.yaml; then
              echo "✅ Found ${RESOURCE}"
            else
              echo "⚠️ Missing ${RESOURCE} (may be conditional)"
            fi
          done

  # ── Build & Push ─────────────────────────────────────────────────
  build:
    name: Build & Push Image
    needs: [test, helm-validate]
    runs-on: ubuntu-latest
    environment: platform
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}
      acr_login_server: ${{ vars.ACR_LOGIN_SERVER }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.PLATFORM_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PLATFORM_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PLATFORM_AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "### 🐳 Image pushed" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # 0.28.0
        continue-on-error: true   # TODO: set exit-code: '1' once base images are clean
        with:
          image-ref: ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ── Deploy (optional) ────────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    needs: build
    if: inputs.deploy == true
    runs-on: ubuntu-latest
    environment: ${{ inputs.customer_id }}-${{ inputs.environment }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks install-cli 2>/dev/null || true
          az aks get-credentials \
            --resource-group rg-dai-${{ inputs.customer_id }}-${{ inputs.environment }}-${{ inputs.region_short }} \
            --name aks-dai-${{ inputs.customer_id }}-${{ inputs.environment }}-${{ inputs.region_short }}
          kubelogin convert-kubeconfig -l azurecli

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Helm upgrade
        run: |
          ACR_SERVER="${{ needs.build.outputs.acr_login_server }}"

          # Dynamically discover all model config YAMLs
          SET_FILE_ARGS=""
          for f in deploy/models/*.yaml; do
            basename=$(basename "$f")
            # Escape dots in the key for Helm --set-file syntax
            key=$(echo "$basename" | sed 's/\./\\./g')
            SET_FILE_ARGS="$SET_FILE_ARGS --set-file modelConfigs.${key}=${f}"
          done

          helm upgrade --install directai deploy/helm/directai \
            --namespace directai --create-namespace \
            --set apiServer.image.repository=${ACR_SERVER}/${{ env.IMAGE_NAME }} \
            --set apiServer.image.tag=${{ needs.build.outputs.image_tag }} \
            $SET_FILE_ARGS \
            --wait --timeout 5m

      - name: Post-deploy smoke test
        run: |
          echo "Waiting for API server rollout..."
          kubectl rollout status deployment/directai-api-server \
            --namespace directai --timeout=120s

          echo "Running health check..."
          kubectl run smoke-test --rm -i --restart=Never \
            --namespace directai \
            --image=curlimages/curl:latest -- \
            curl -sf http://directai-api-server:8000/healthz

          echo "✓ Smoke test passed"
