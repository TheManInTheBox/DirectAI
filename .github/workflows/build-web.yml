# ============================================================================
# Build Web — Lint, build, push web frontend image to Platform ACR
# Triggers on changes to src/web/ or manual dispatch.
#
# Auth: OIDC federated credentials targeting the platform subscription.
# SECURITY: All third-party actions pinned to commit SHAs.
# ============================================================================
name: Build Web

on:
  push:
    branches: [main]
    paths:
      - "src/web/**"
      - "deploy/helm/directai/templates/web-*"
      - "deploy/helm/directai/values-platform.yaml"
      - ".github/workflows/build-web.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/web/**"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Platform AKS after build"
        type: boolean
        default: false
      environment:
        description: "Platform environment"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev
      region_short:
        description: "Region short name"
        required: true
        type: choice
        options:
          - eus2
          - wus3
        default: eus2

permissions:
  id-token: write
  contents: read

env:
  WEB_DIR: src/web
  # Default to dev/eus2 for push-triggered builds
  PLATFORM_ENV: ${{ inputs.environment || 'dev' }}
  PLATFORM_REGION: ${{ inputs.region_short || 'eus2' }}

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WEB_DIR }}
        run: npm ci

      - name: Lint
        working-directory: ${{ env.WEB_DIR }}
        run: npm run lint

      - name: Type check
        working-directory: ${{ env.WEB_DIR }}
        run: npx tsc --noEmit

  # ── Build & Push ───────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: platform
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.PLATFORM_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PLATFORM_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PLATFORM_AZURE_SUBSCRIPTION_ID }}

      - name: Set image metadata
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | head -c 7)
          echo "image_tag=sha-${SHA}" >> "$GITHUB_OUTPUT"
          echo "Image tag: sha-${SHA}"

      - name: Build & push to ACR
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image "web:${{ steps.meta.outputs.image_tag }}" \
            --image "web:latest" \
            --file ${{ env.WEB_DIR }}/Dockerfile \
            ${{ env.WEB_DIR }}/

  # ── Deploy to Platform AKS (optional) ──────────────────────────────────
  deploy:
    name: Deploy to Platform AKS
    needs: build
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy)
    environment: platform
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.PLATFORM_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PLATFORM_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PLATFORM_AZURE_SUBSCRIPTION_ID }}

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Get AKS credentials
        run: |
          az aks install-cli 2>/dev/null || true
          az aks get-credentials \
            --resource-group "rg-dai-platform-${{ env.PLATFORM_ENV }}-${{ env.PLATFORM_REGION }}" \
            --name "aks-dai-platform-${{ env.PLATFORM_ENV }}-${{ env.PLATFORM_REGION }}" \
            --overwrite-existing
          kubelogin convert-kubeconfig -l azurecli

      - name: Helm upgrade
        run: |
          helm upgrade --install directai-platform deploy/helm/directai/ \
            -f deploy/helm/directai/values-platform.yaml \
            --namespace directai --create-namespace \
            --set web.image.tag="${{ needs.build.outputs.image_tag }}" \
            --wait --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/directai-platform-web -n directai --timeout=120s
          echo "✅ Web frontend deployed successfully"

      - name: Summary
        run: |
          echo "## 🌐 Web Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ vars.ACR_LOGIN_SERVER }}/web:${{ needs.build.outputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Cluster** | \`aks-dai-platform-${{ env.PLATFORM_ENV }}-${{ env.PLATFORM_REGION }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Namespace** | \`directai\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **URL** | https://agilecloud.ai |" >> "$GITHUB_STEP_SUMMARY"

  # ── Functional Tests (post-deploy) ──────────────────────────────────────
  functional-tests:
    name: Functional Tests
    needs: deploy
    uses: ./.github/workflows/functional-tests.yml
    with:
      api_base_url: "https://api.agilecloud.ai"
      web_base_url: "https://agilecloud.ai"
      test_scope: web
      environment: platform
    secrets:
      FUNC_TEST_API_KEY: ${{ secrets.FUNC_TEST_API_KEY }}
