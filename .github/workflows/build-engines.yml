# ============================================================================
# DirectAI — Build & Push Inference Engine Images
# Builds the embeddings-engine and trtllm-engine Docker images, pushes to ACR.
#
# Triggers:
#   - Push to main that changes src/embeddings-engine/** or src/trtllm-engine/**
#   - Manual dispatch with engine selection
#
# Auth: OIDC federated credentials targeting the platform subscription.
# SECURITY: Pin third-party actions to commit SHAs before going to production.
#           Run `npx pin-github-action .github/workflows/*.yml` to automate.
#
# Notes:
#   - The TRT-LLM image is large (~15GB+). Build runners need adequate disk.
#   - For CI testing, TRT-LLM builds use USE_STUB=true (stub mode).
#   - Production TRT-LLM images are built with USE_STUB=false.
# ============================================================================

name: Build Inference Engines

on:
  push:
    branches: [main]
    paths:
      - 'src/embeddings-engine/**'
      - 'src/trtllm-engine/**'
  workflow_dispatch:
    inputs:
      engines:
        description: 'Which engines to build'
        required: true
        type: choice
        options:
          - all
          - embeddings
          - trtllm
        default: all
      trtllm_mode:
        description: 'TRT-LLM build mode'
        required: false
        type: choice
        options:
          - production
          - stub
        default: production

permissions:
  id-token: write
  contents: read

jobs:
  # ── Determine which engines changed ──────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      embeddings: ${{ steps.filter.outputs.embeddings }}
      trtllm: ${{ steps.filter.outputs.trtllm }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            embeddings:
              - 'src/embeddings-engine/**'
            trtllm:
              - 'src/trtllm-engine/**'

  # ── Embeddings Engine ────────────────────────────────────────────
  build-embeddings:
    name: Build Embeddings Engine
    needs: changes
    if: |
      needs.changes.outputs.embeddings == 'true' ||
      github.event.inputs.engines == 'all' ||
      github.event.inputs.engines == 'embeddings'
    runs-on: ubuntu-latest
    environment: platform
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: src/embeddings-engine/pyproject.toml

      - name: Install deps & lint
        working-directory: src/embeddings-engine
        run: |
          pip install -e ".[dev,cpu]"
          ruff check engine/ tests/

      - name: Run tests
        working-directory: src/embeddings-engine
        run: python -m pytest tests/ -v

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.PLATFORM_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PLATFORM_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PLATFORM_AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ vars.ACR_LOGIN_SERVER }}/embeddings-engine
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: src/embeddings-engine
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BAKE_MODEL=0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "### 🧮 Embeddings Engine pushed" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # 0.28.0
        continue-on-error: true   # TODO: set exit-code: '1' once base images are clean
        with:
          image-ref: ${{ vars.ACR_LOGIN_SERVER }}/embeddings-engine:${{ steps.meta.outputs.version }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ── TRT-LLM Engine ──────────────────────────────────────────────
  build-trtllm:
    name: Build TRT-LLM Engine
    needs: changes
    if: |
      needs.changes.outputs.trtllm == 'true' ||
      github.event.inputs.engines == 'all' ||
      github.event.inputs.engines == 'trtllm'
    runs-on: ubuntu-latest
    environment: platform
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: src/trtllm-engine/pyproject.toml

      - name: Install deps & lint
        working-directory: src/trtllm-engine
        run: |
          pip install -e ".[dev]"
          ruff check engine/ tests/

      - name: Run tests
        working-directory: src/trtllm-engine
        run: python -m pytest tests/ -v

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.PLATFORM_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PLATFORM_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PLATFORM_AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Set TRT-LLM build arg
        id: trtllm-mode
        run: |
          MODE="${{ github.event.inputs.trtllm_mode }}"
          # Default to stub for push-triggered builds (no inputs available)
          if [ -z "$MODE" ] || [ "$MODE" = "stub" ]; then
            echo "use_stub=true" >> $GITHUB_OUTPUT
            echo "base_image=nvidia/cuda:12.4.1-devel-ubuntu22.04" >> $GITHUB_OUTPUT
          else
            echo "use_stub=false" >> $GITHUB_OUTPUT
            echo "base_image=nvcr.io/nvidia/tensorrt-llm/release:0.16.0" >> $GITHUB_OUTPUT
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ vars.ACR_LOGIN_SERVER }}/trtllm-engine
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Free disk space
        # TRT-LLM base images are large — free runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune --all --force
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: src/trtllm-engine
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            USE_STUB=${{ steps.trtllm-mode.outputs.use_stub }}
            BASE_IMAGE=${{ steps.trtllm-mode.outputs.base_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "### 🚀 TRT-LLM Engine pushed" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "**Stub mode:** ${{ steps.trtllm-mode.outputs.use_stub }}" >> $GITHUB_STEP_SUMMARY

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # 0.28.0
        continue-on-error: true   # TODO: set exit-code: '1' once base images are clean
        with:
          image-ref: ${{ vars.ACR_LOGIN_SERVER }}/trtllm-engine:${{ steps.meta.outputs.version }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
