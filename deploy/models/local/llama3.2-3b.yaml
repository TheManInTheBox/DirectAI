apiVersion: directai/v1
kind: ModelDeployment
metadata:
  name: llama3.2-3b
spec:
  displayName: "Llama 3.2 3B (Local/Ollama)"
  ownedBy: meta
  modality: chat
  engine:
    type: ollama
    backendUrl: "http://localhost:11434"
  hardware:
    gpuSku: local
    gpuCount: 1
    nvmeCacheEnabled: false
  scaling:
    tier: always-warm
    minReplicas: 1
    maxReplicas: 1
    targetConcurrency: 1
  api:
    aliases:
      - llama3.2:3b
      - llama3.2
