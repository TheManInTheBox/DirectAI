# ============================================================================
# DirectAI Helm Chart — Platform Values (agilecloud.ai website)
# AKS: Platform AKS (CPU-only)  |  ACR: acrplatformdaiv7fgid.azurecr.io
# This values file is used ONLY on the Platform AKS cluster.
# It enables the web frontend and disables inference backends.
# ============================================================================

global:
  namespace: directai

# ── API Server — disabled on Platform AKS ──────────────────────────────────
# The API server runs on inference stamps, not the platform cluster.
apiServer:
  replicaCount: 0

  image:
    repository: acrplatformdaiv7fgid.azurecr.io/api-server
    tag: "latest"
    pullPolicy: Always

  autoscaling:
    enabled: false

# ── Web Frontend — ENABLED on Platform AKS ─────────────────────────────────
web:
  enabled: true

  replicaCount: 2

  image:
    repository: acrplatformdaiv7fgid.azurecr.io/web
    tag: "latest"
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 3000

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  env:
    NEXT_PUBLIC_API_URL: "https://api.agilecloud.ai"

  # ── Key Vault → K8s Secret sync via CSI driver ─────────────────────────
  secretStore:
    enabled: true
    keyVaultName: "kvplatdaiv7fgid"
    tenantId: "7dd8cf8b-3a69-4cb3-96c9-0a9e63fe6127"
    secrets:
      - objectName: database-url
        secretKey: DATABASE_URL
      - objectName: auth-secret
        secretKey: AUTH_SECRET
      - objectName: auth-entra-external-issuer
        secretKey: AUTH_ENTRA_EXTERNAL_ISSUER
      - objectName: auth-entra-external-client-id
        secretKey: AUTH_ENTRA_EXTERNAL_CLIENT_ID
      - objectName: auth-entra-external-client-secret
        secretKey: AUTH_ENTRA_EXTERNAL_CLIENT_SECRET
      - objectName: stripe-secret-key
        secretKey: STRIPE_SECRET_KEY
      - objectName: stripe-webhook-secret
        secretKey: STRIPE_WEBHOOK_SECRET
      - objectName: stripe-pro-price-id
        secretKey: STRIPE_PRO_PRICE_ID
      - objectName: stripe-meter-id-tokens
        secretKey: STRIPE_METER_ID_TOKENS

  ingress:
    enabled: true
    className: nginx
    tlsSecretName: directai-web-tls
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    hosts:
      - host: agilecloud.ai
        paths:
          - path: /
            pathType: Prefix
      - host: www.agilecloud.ai
        paths:
          - path: /
            pathType: Prefix

  nodeSelector: {}

# ── Ingress — disabled (web has its own ingress) ──────────────────────────
ingress:
  enabled: false

# ── TLS — Let's Encrypt via cert-manager ──────────────────────────────────
tls:
  enabled: true
  certManager:
    enabled: true
    issuer: letsencrypt-prod

# ── Service Account ───────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: directai
  annotations: {}

# ── Inference Backends — DISABLED on Platform AKS ─────────────────────────
backends: {}

# ── Everything inference-related is off ───────────────────────────────────
workloadIdentity:
  enabled: true
  clientId: "8af5d654-2816-42a0-a996-e9a252cf83d5"
networkPolicy:
  enabled: true
keda:
  enabled: false
prometheusRules:
  enabled: false
priorityClass:
  enabled: false
nvmeInit:
  enabled: false
dcgmExporter:
  enabled: false
datadogOtlp:
  enabled: false
