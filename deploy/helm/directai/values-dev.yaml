# ============================================================================
# DirectAI Helm Chart — Dev Environment Values (internal-dev-scus)
# AKS: aks-dai-internal-dev-scus  |  ACR: acrplatformdaiv7fgid.azurecr.io
# ============================================================================

global:
  namespace: directai

# ── API Server ─────────────────────────────────────────────────────────────
apiServer:
  replicaCount: 1

  image:
    repository: acrplatformdaiv7fgid.azurecr.io/api-server
    tag: "latest"
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 8000

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

  env:
    DIRECTAI_LOG_LEVEL: "debug"
    DIRECTAI_BACKEND_TIMEOUT: "300"
    DIRECTAI_BACKEND_CONNECT_TIMEOUT: "10"
    DIRECTAI_OTEL_ENABLED: "false"

  secretStore:
    enabled: true
    keyVaultName: "kvdaioruw33y5cls6bz"
    tenantId: "7dd8cf8b-3a69-4cb3-96c9-0a9e63fe6127"
    secrets:
      - objectName: database-url
        secretKey: DIRECTAI_DATABASE_URL

  modelConfigDir: /app/models

  autoscaling:
    enabled: false

# ── Ingress — api.agilecloud.ai ────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"        # SSE streaming
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Relaxed rate limiting for dev
    nginx.ingress.kubernetes.io/limit-rps: "0"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "0"
    nginx.ingress.kubernetes.io/limit-connections: "0"
  hosts:
    - host: api.agilecloud.ai
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: directai-tls
      hosts:
        - api.agilecloud.ai

# ── TLS — Let's Encrypt via cert-manager ──────────────────────────────────
tls:
  enabled: true
  certManager:
    enabled: true
    issuer: letsencrypt-prod

# ── Service Account (Workload Identity) ────────────────────────────────────
serviceAccount:
  create: true
  name: directai
  annotations:
    azure.workload.identity/client-id: "0d60bdcc-b4e9-4cee-b1a5-53995135fa45"

workloadIdentity:
  enabled: true
  clientId: "0d60bdcc-b4e9-4cee-b1a5-53995135fa45"

# ── Web Frontend — disabled on inference stamps ──────────────────────────
# Web runs on Platform AKS only. Inference stamps don't serve the website.
web:
  enabled: false

# ── Inference Backends ──────────────────────────────────────────────────────
# Model baked into image via BAKE_MODEL=1 — no weightsUri / init container.
backends:
  bge-large-en-v1-5:
    image: "acrplatformdaiv7fgid.azurecr.io/embeddings-engine:bge-baked"
    imagePullPolicy: Always
    modality: embedding
    replicas: 1
    port: 8001
    gpu:
      count: 1
      nodePoolLabel: "t4"           # matches directai.io/gpu-pool label
    resources:
      requests:
        cpu: "2"
        memory: 4Gi
      limits:
        cpu: "4"
        memory: 8Gi
    env:
      EMBED_LOG_LEVEL: "debug"
      EMBED_MAX_BATCH_SIZE: "256"
      EMBED_EXECUTION_PROVIDER: "CUDAExecutionProvider"
    scaling:
      enabled: false                # single replica for dev
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "t4"
        effect: "NoSchedule"

  # ── vLLM — Qwen 2.5 3B Instruct (FP16 on T4) ────────────────────────────
  # vLLM auto-downloads the model from HuggingFace at startup.
  # First pod startup takes ~5-10 min (download). Subsequent starts use
  # emptyDir cache (if pod stays on the same node).
  qwen2-5-3b-instruct:
    image: "vllm/vllm-openai:v0.16.0-cu130"
    imagePullPolicy: IfNotPresent
    modality: chat
    replicas: 1
    port: 8001
    args:
      - "--model"
      - "Qwen/Qwen2.5-3B-Instruct"
      - "--served-model-name"
      - "qwen2-5-3b-instruct"
      - "--port"
      - "8001"
      - "--dtype"
      - "half"                      # T4 doesn't support BF16
      - "--max-model-len"
      - "4096"
      - "--gpu-memory-utilization"
      - "0.85"
      - "--disable-log-requests"
      - "--trust-remote-code"
    gpu:
      count: 1
      nodePoolLabel: "t4"
    resources:
      requests:
        cpu: "2"
        memory: 8Gi
      limits:
        cpu: "8"
        memory: 16Gi
    securityContext:
      readOnlyRootFilesystem: false   # vLLM writes to ~/.cache, ~/.triton, etc.
    modelCache:
      enabled: true                   # emptyDir for HuggingFace model cache
    cacheSize: "20Gi"                 # 3B FP16 ≈ 6GB + overhead
    probes:
      liveness:
        path: /health
      readiness:
        path: /health
      startup:
        path: /health
        failureThreshold: 120         # 120 * 10s = 20 min for model download
    env:
      HF_HOME: "/model-cache/hf"
      VLLM_NO_USAGE_STATS: "1"
      VLLM_USAGE_SOURCE: "production"
      # Prioritize host-mounted NVIDIA driver over container's compat libs.
      # Container ships libcuda.so.580.82.07 in /usr/local/cuda-13.0/compat/
      # which mismatches the host kernel driver 580.95.05 → CUDA Error 803.
      LD_LIBRARY_PATH: "/lib/x86_64-linux-gnu"
    scaling:
      enabled: false
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "t4"
        effect: "NoSchedule"

# ── Model Configs (API server model registry) ─────────────────────────────
# Embedded so bare `helm install -f values-dev.yaml` produces a working
# API server with at least one model registered. CI/CD can override via
# --set-file for additional models.
modelConfigs:
  bge-large-en-v1.5.yaml: |
    apiVersion: directai/v1
    kind: ModelDeployment
    metadata:
      name: bge-large-en-v1-5
    spec:
      displayName: "BAAI BGE Large English v1.5"
      ownedBy: baai
      modality: embedding
      engine:
        type: onnxruntime
        image: "acrplatformdaiv7fgid.azurecr.io/embeddings-engine:bge-baked"
        maxBatchSize: 256
      hardware:
        gpuSku: Standard_NCasT4_v3
        gpuCount: 1
        nvmeCacheEnabled: false
      scaling:
        tier: always-warm
        minReplicas: 1
        maxReplicas: 2
        targetConcurrency: 64
      api:
        aliases:
          - bge-large-en-v1.5
          - baai/bge-large-en-v1.5

  qwen2.5-3b-instruct.yaml: |
    apiVersion: directai/v1
    kind: ModelDeployment
    metadata:
      name: qwen2-5-3b-instruct
    spec:
      displayName: "Qwen 2.5 3B Instruct"
      ownedBy: qwen
      modality: chat
      engine:
        type: vllm
        image: "vllm/vllm-openai:v0.16.0-cu130"
      hardware:
        gpuSku: Standard_NCasT4_v3
        gpuCount: 1
        nvmeCacheEnabled: false
      scaling:
        tier: scale-to-zero
        minReplicas: 0
        maxReplicas: 2
        targetConcurrency: 8
      api:
        aliases:
          - qwen2.5-3b-instruct
          - qwen/qwen2.5-3b-instruct
          - Qwen/Qwen2.5-3B-Instruct

# ── Network Policy ─────────────────────────────────────────────────────────
networkPolicy:
  enabled: true

# ── KEDA — enabled on cluster but no ScaledObjects until backends added ────
keda:
  enabled: true
  pollingInterval: 15
  cooldownPeriod: 300

# ── Prometheus / monitoring — disabled until Prometheus Operator installed ──
prometheusRules:
  enabled: false

# ── Priority Class — enabled for when GPU backends come online ─────────────
priorityClass:
  enabled: true
  name: directai-inference
  value: 1000000

# ── NVMe init — disabled, T4 dev nodes don't have local NVMe ──────────────
nvmeInit:
  enabled: false

# ── DCGM Exporter — disabled for dev ──────────────────────────────────────
dcgmExporter:
  enabled: false

# ── Datadog — disabled ────────────────────────────────────────────────────
datadogOtlp:
  enabled: false
