# ============================================================================
# DirectAI Helm Chart — Dev Environment Values (internal-dev-scus)
# AKS: aks-dai-internal-dev-scus  |  ACR: acrplatformdaiv7fgid.azurecr.io
# ============================================================================

global:
  namespace: directai

# ── API Server ─────────────────────────────────────────────────────────────
apiServer:
  replicaCount: 1

  image:
    repository: acrplatformdaiv7fgid.azurecr.io/api-server
    tag: "latest"
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 8000

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

  env:
    DIRECTAI_LOG_LEVEL: "debug"
    DIRECTAI_BACKEND_TIMEOUT: "300"
    DIRECTAI_BACKEND_CONNECT_TIMEOUT: "10"
    DIRECTAI_OTEL_ENABLED: "false"

  modelConfigDir: /app/models

  autoscaling:
    enabled: false

# ── Ingress — nip.io wildcard DNS (no real domain in dev) ──────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"        # SSE streaming
    nginx.ingress.kubernetes.io/ssl-redirect: "false"         # No TLS in dev
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"   # Override base
    # Null out rate limiting for dev (override base values)
    nginx.ingress.kubernetes.io/limit-rps: "0"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "0"
    nginx.ingress.kubernetes.io/limit-connections: "0"
  hosts:
    - host: api.48.192.177.54.nip.io
      paths:
        - path: /
          pathType: Prefix
  # Explicitly empty TLS to override base values.yaml ingress.tls
  tls: []

# ── TLS — disabled for dev (nip.io can't get real certs) ──────────────────
tls:
  enabled: false
  certManager:
    enabled: false

# ── Service Account (Workload Identity) ────────────────────────────────────
serviceAccount:
  create: true
  name: directai
  annotations:
    azure.workload.identity/client-id: "0d60bdcc-b4e9-4cee-b1a5-53995135fa45"

workloadIdentity:
  enabled: true
  clientId: "0d60bdcc-b4e9-4cee-b1a5-53995135fa45"

# ── Inference Backends ──────────────────────────────────────────────────────
# Model baked into image via BAKE_MODEL=1 — no weightsUri / init container.
backends:
  bge-large-en-v1-5:
    image: "acrplatformdaiv7fgid.azurecr.io/embeddings-engine:bge-baked"
    imagePullPolicy: Always
    modality: embedding
    replicas: 1
    port: 8001
    gpu:
      count: 1
      nodePoolLabel: "t4"           # matches directai.io/gpu-pool label
    resources:
      requests:
        cpu: "2"
        memory: 4Gi
      limits:
        cpu: "4"
        memory: 8Gi
    env:
      EMBED_LOG_LEVEL: "debug"
      EMBED_MAX_BATCH_SIZE: "256"
      EMBED_EXECUTION_PROVIDER: "CUDAExecutionProvider"
    scaling:
      enabled: false                # single replica for dev
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "t4"
        effect: "NoSchedule"

# ── Network Policy ─────────────────────────────────────────────────────────
networkPolicy:
  enabled: true

# ── KEDA — enabled on cluster but no ScaledObjects until backends added ────
keda:
  enabled: true
  pollingInterval: 15
  cooldownPeriod: 300

# ── Prometheus / monitoring — disabled until Prometheus Operator installed ──
prometheusRules:
  enabled: false

# ── Priority Class — enabled for when GPU backends come online ─────────────
priorityClass:
  enabled: true
  name: directai-inference
  value: 1000000

# ── NVMe init — disabled, T4 dev nodes don't have local NVMe ──────────────
nvmeInit:
  enabled: false

# ── DCGM Exporter — disabled for dev ──────────────────────────────────────
dcgmExporter:
  enabled: false

# ── Datadog — disabled ────────────────────────────────────────────────────
datadogOtlp:
  enabled: false
