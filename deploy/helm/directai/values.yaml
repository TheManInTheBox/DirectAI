# ============================================================================
# DirectAI Helm Chart — Default Values
# ============================================================================

global:
  namespace: directai

# ── API Server ─────────────────────────────────────────────────────────────
apiServer:
  replicaCount: 2

  image:
    repository: directai.azurecr.io/api-server
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8000

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi

  env:
    DIRECTAI_LOG_LEVEL: "info"
    DIRECTAI_BACKEND_TIMEOUT: "300"
    DIRECTAI_BACKEND_CONNECT_TIMEOUT: "5"

  # Mount path for model config YAMLs (ConfigMap or volume)
  modelConfigDir: /app/models

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []

# ── Ingress ────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # Enable SSE streaming
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # TLS hardening — force HTTPS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting — coarse per-IP limit (fine-grained per-key in middleware)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    # ── Production-only annotations (add in values-prod.yaml) ──
    # These require controller.allowSnippetAnnotations=true on NGINX Ingress:
    # nginx.ingress.kubernetes.io/configuration-snippet: |
    #   more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";
    # nginx.ingress.kubernetes.io/server-snippet: |
    #   location = /metrics { deny all; return 403; }
    #   location = /healthz { deny all; return 403; }
    #   location = /readyz  { deny all; return 403; }
  hosts:
    - host: api.directai.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: directai-tls
      hosts:
        - api.directai.local

# ── Inference Backends ─────────────────────────────────────────────────────
# Each entry here creates a Deployment + Service + optional KEDA ScaledObject.
# Keys match metadata.name from ModelDeployment YAMLs.
backends: {}
  # Example: uncomment to deploy
  # llama-3-1-70b-instruct:
  #   image: directai.azurecr.io/trtllm-llama-70b:latest
  #   modality: chat
  #   replicas: 1
  #   gpu:
  #     count: 2
  #     sku: Standard_ND96asr_v4
  #     nodePoolLabel: gpu-a100       # matches AKS node pool label
  #   port: 8001
  #   resources:
  #     requests:
  #       cpu: "4"
  #       memory: 32Gi
  #     limits:
  #       cpu: "8"
  #       memory: 64Gi
  #   env:
  #     MODEL_NAME: llama-3.1-70b-instruct
  #   maxInflightRequests: 128  # → TRTLLM_MAX_INFLIGHT_REQUESTS env var
  #   scaling:
  #     enabled: true
  #     minReplicas: 1
  #     maxReplicas: 4
  #     targetConcurrency: 8
  #   nvmeCache:
  #     enabled: true
  #     sizeMi: 200000              # 200GB for model weights
  #   tolerations:
  #     - key: "nvidia.com/gpu"
  #       operator: "Exists"
  #       effect: "NoSchedule"
  #
  # bge-large-en-v1-5:
  #   image: directai.azurecr.io/onnxrt-bge-large:latest
  #   modality: embedding
  #   replicas: 2
  #   gpu:
  #     count: 1
  #     nodePoolLabel: gpu-a10g
  #   port: 8001
  #   resources:
  #     requests:
  #       cpu: "2"
  #       memory: 8Gi
  #     limits:
  #       cpu: "4"
  #       memory: 16Gi
  #   scaling:
  #     enabled: true
  #     minReplicas: 2
  #     maxReplicas: 8
  #     targetConcurrency: 64

# ── Service Account ────────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: directai
  annotations: {}
  # For Azure Workload Identity:
  #   azure.workload.identity/client-id: <kubelet-identity-client-id>

# ── Image Pull Secrets ─────────────────────────────────────────────────────
imagePullSecrets: []

# ── Network Policy ─────────────────────────────────────────────────────────
networkPolicy:
  enabled: true

# ── Prometheus Alerting Rules ──────────────────────────────────────────────
prometheusRules:
  enabled: false  # Enable when Prometheus Operator is installed

# ── KEDA ───────────────────────────────────────────────────────────────────
keda:
  # If true, KEDA ScaledObjects are created for backends with scaling.enabled
  enabled: true
  pollingInterval: 15
  cooldownPeriod: 300
  prometheusServerAddress: http://prometheus-server.monitoring.svc.cluster.local
# ── Model Config Files ─────────────────────────────────────────────
# ModelDeployment YAML files to mount into the API server.
# Injected at deploy time via --set-file:
#   --set-file "modelConfigs.llama\.yaml=deploy/models/llama-3.1-70b-instruct.yaml"
modelConfigs: {}
# ── Workload Identity ──────────────────────────────────────────────────────
# Required for init containers to pull weights from Azure Blob Storage.
# The clientId must match the kubelet managed identity created by main.bicep.
workloadIdentity:
  enabled: false
  clientId: ""

# ── Init Container (weight puller) ────────────────────────────────────────
initContainer:
  image: "mcr.microsoft.com/azure-cli:2.67.0"

# ── Priority Class ─────────────────────────────────────────────────────────
# PriorityClass for GPU inference pods — prevents preemption by lower-priority
# workloads. GPU cold starts are expensive; protect running inference.
priorityClass:
  enabled: true
  name: directai-inference
  value: 1000000
  preemptionPolicy: PreemptLowerPriority
  description: "High priority for DirectAI GPU inference pods"

# ── NVMe Init DaemonSet ───────────────────────────────────────────────────
# Formats and mounts node-local NVMe SSDs on GPU inference nodes.
# Required when any backend uses nvmeCache.enabled = true.
nvmeInit:
  enabled: false
  image: "alpine:3.20"
  nodeSelector:
    directai.io/pool: inference

# ── DCGM Exporter — GPU metrics ──────────────────────────────────────────
# Deploys NVIDIA DCGM Exporter as a DaemonSet on GPU nodes.
# Exposes GPU utilization, memory, temperature, power, NVLink throughput,
# tensor core activity, and ECC error counters as Prometheus metrics.
dcgmExporter:
  enabled: false
  image:
    repository: nvcr.io/nvidia/k8s/dcgm-exporter
    tag: "3.3.8-3.6.0-ubuntu22.04"
    pullPolicy: IfNotPresent
  # Collect interval in milliseconds (default 30000 = 30s)
  collectInterval: "15000"
  # Enable custom metrics CSV (tensor cores, NVLink, ECC errors)
  customMetrics: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  nodeSelector:
    directai.io/pool: inference
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
    - key: directai.io/workload
      operator: Exists
      effect: NoSchedule

# ── Datadog Integration ──────────────────────────────────────────────────
# To export metrics and traces to Datadog, deploy the Datadog Agent with
# OTLP receiver enabled, then set datadogOtlp.enabled=true below.
#
# Install Datadog Agent:
#   helm install datadog-agent datadog/datadog \
#     --set datadog.apiKey=<DD_API_KEY> \
#     --set datadog.otlp.receiver.protocols.grpc.enabled=true \
#     --set datadog.otlp.receiver.protocols.grpc.endpoint="0.0.0.0:4317"
#
# The API server's OTLP exporter (DIRECTAI_OTLP_ENDPOINT) should point to
# the Datadog Agent's OTLP gRPC endpoint.
datadogOtlp:
  enabled: false
  endpoint: "http://datadog-agent.datadog.svc.cluster.local:4317"

# ── TLS / cert-manager ────────────────────────────────────────────────────
tls:
  enabled: true
  secretName: directai-tls
  certManager:
    enabled: true
    issuer: letsencrypt-prod  # example.yaml: |
  #   apiVersion: directai/v1
  #   kind: ModelDeployment
  #   ...