{{- if and .Values.web.enabled .Values.web.secretStore.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Release.Name }}-web-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "directai.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.workloadIdentity.clientId | quote }}
    keyvaultName: {{ .Values.web.secretStore.keyVaultName | quote }}
    tenantId: {{ .Values.web.secretStore.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.web.secretStore.secrets }}
        - |
          objectName: {{ .objectName }}
          objectType: secret
        {{- end }}
  secretObjects:
    - secretName: {{ .Release.Name }}-web-env
      type: Opaque
      data:
        {{- range .Values.web.secretStore.secrets }}
        - objectName: {{ .objectName }}
          key: {{ .secretKey }}
        {{- end }}
{{- end }}
