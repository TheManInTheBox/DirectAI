{{/*
NetworkPolicy — restricts traffic to backend inference pods.
Only the API server pods can reach backend ports. Prometheus
scraping is allowed from the monitoring namespace.
*/}}
{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-backend-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "directai.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: backend
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from the API server pods
    - from:
        - podSelector:
            matchLabels:
              {{- include "directai.apiServerSelectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8001
    # Allow Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8001
{{- end }}
