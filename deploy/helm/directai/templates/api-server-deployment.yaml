apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api-server
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "directai.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-server
spec:
  revisionHistoryLimit: 5
  {{- if not .Values.apiServer.autoscaling.enabled }}
  replicas: {{ .Values.apiServer.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "directai.apiServerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "directai.apiServerSelectorLabels" . | nindent 8 }}
        {{- if .Values.workloadIdentity.enabled }}
        azure.workload.identity/use: "true"
        {{- end }}
      {{- with .Values.apiServer.podAnnotations }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $.Values.apiServer.service.port | quote }}
        prometheus.io/path: "/metrics"
        {{- toYaml . | nindent 8 }}
      {{- else }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.apiServer.service.port | quote }}
        prometheus.io/path: "/metrics"
      {{- end }}
    spec:
      serviceAccountName: {{ include "directai.serviceAccountName" . }}
      terminationGracePeriodSeconds: 310
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api-server
          image: "{{ .Values.apiServer.image.repository }}:{{ .Values.apiServer.image.tag }}"
          imagePullPolicy: {{ .Values.apiServer.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.apiServer.service.port }}
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          env:
            - name: DIRECTAI_HOST
              value: "0.0.0.0"
            - name: DIRECTAI_PORT
              value: {{ .Values.apiServer.service.port | quote }}
            - name: DIRECTAI_MODEL_CONFIG_DIR
              value: {{ .Values.apiServer.modelConfigDir | quote }}
            {{- range $key, $value := .Values.apiServer.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.apiServer.apiKeysSecretName }}
            - name: DIRECTAI_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiServer.apiKeysSecretName }}
                  key: api-keys
            {{- end }}
          {{- if .Values.apiServer.secretStore.enabled }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-api-server-env
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.apiServer.resources | nindent 12 }}
          volumeMounts:
            - name: model-config
              mountPath: {{ .Values.apiServer.modelConfigDir }}
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /app/data
            {{- if .Values.apiServer.secretStore.enabled }}
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
            {{- end }}
      volumes:
        - name: model-config
          configMap:
            name: {{ .Release.Name }}-model-config
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: data
          emptyDir:
            sizeLimit: 128Mi
        {{- if .Values.apiServer.secretStore.enabled }}
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Release.Name }}-api-server-secrets
        {{- end }}
      {{- with .Values.apiServer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.apiServer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Spread API server pods across availability zones for resilience
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "directai.apiServerSelectorLabels" . | nindent 14 }}
