{{/*
Web Ingress — serves the marketing site / dashboard on the same host.
Only created when web.enabled AND web.ingress.enabled are true.
This is separate from the API ingress so they can be deployed independently
on different clusters (Platform AKS vs Community/Customer AKS).
*/}}
{{- if and .Values.web.enabled .Values.web.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-web-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "directai.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
  annotations:
    {{- with .Values.web.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if and .Values.tls.enabled .Values.tls.certManager.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.tls.certManager.issuer | default "letsencrypt-prod" | quote }}
    {{- end }}
spec:
  {{- if .Values.web.ingress.className }}
  ingressClassName: {{ .Values.web.ingress.className }}
  {{- end }}
  {{- if .Values.tls.enabled }}
  tls:
    - secretName: {{ .Values.web.ingress.tlsSecretName | default "directai-web-tls" }}
      hosts:
        {{- range .Values.web.ingress.hosts }}
        - {{ .host | quote }}
        {{- end }}
  {{- end }}
  rules:
    {{- range .Values.web.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Release.Name }}-web
                port:
                  number: {{ $.Values.web.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
