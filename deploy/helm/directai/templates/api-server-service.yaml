apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api-server
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "directai.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-server
spec:
  type: {{ .Values.apiServer.service.type }}
  ports:
    - port: {{ .Values.apiServer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "directai.apiServerSelectorLabels" . | nindent 4 }}
