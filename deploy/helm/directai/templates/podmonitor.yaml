{{/*
PodMonitor for DirectAI inference backend pods.
Scrapes /metrics on each backend pod directly (no Service intermediary),
which is correct for GPU pods behind KEDA that may scale to zero.
Requires Prometheus Operator to be installed in the cluster.
*/}}
{{- if .Values.prometheusRules.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ .Release.Name }}-backends
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "directai.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: backend
  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - {{ .Values.global.namespace }}
{{- end }}
