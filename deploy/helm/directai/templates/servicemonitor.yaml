{{/*
ServiceMonitor for the DirectAI API server.
Requires Prometheus Operator to be installed in the cluster.
*/}}
{{- if .Values.prometheusRules.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-api-server
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "directai.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-server
spec:
  selector:
    matchLabels:
      {{- include "directai.apiServerSelectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - {{ .Values.global.namespace }}
{{- end }}
