# ============================================================================
# DirectAI Helm Chart — Production Environment Values
# AKS: aks-dai-internal-prod-{scus,eus2,wus3}
# GPU: Standard_ND96asr_v4 (8× A100 80GB, NVLink, 3.8TB NVMe per node)
# ACR: acrplatformdaiv7fgid.azurecr.io
#
# Production differs from dev:
#   - A100 80GB GPU pools (NVMe-backed), not T4
#   - vLLM with BF16 (A100 native), not FP16
#   - Llama 3.1 70B with TP=2 (tensor parallel across 2 GPUs)
#   - HPA autoscaling on all backends (always-warm, minReplicas >= 1)
#   - Stricter resource limits and rate limiting
#   - OTEL tracing at 10% sampling + Prometheus rules enabled
#   - Multi-replica API server with HPA
#   - NVMe init DaemonSet + DCGM GPU exporter
#   - Front Door Premium handles global routing to this cluster
#
# Per-stamp overrides (Key Vault name, workload identity):
#   helm upgrade directai ./deploy/helm/directai -f values-prod.yaml \
#     --set apiServer.secretStore.keyVaultName=<kv-name> \
#     --set serviceAccount.annotations."azure\.workload\.identity/client-id"=<id>
# ============================================================================

global:
  namespace: directai

# ── API Server ─────────────────────────────────────────────────────────────
apiServer:
  replicaCount: 3

  image:
    repository: acrplatformdaiv7fgid.azurecr.io/api-server
    tag: "latest"                     # Pin to SHA digest in real deploys
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8000

  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

  env:
    DIRECTAI_LOG_LEVEL: "info"
    DIRECTAI_BACKEND_TIMEOUT: "300"
    DIRECTAI_BACKEND_CONNECT_TIMEOUT: "5"
    DIRECTAI_OTEL_ENABLED: "true"
    DIRECTAI_OTEL_SAMPLE_RATE: "0.1"  # 10% sampling in prod
    DIRECTAI_RATE_LIMIT_RPM: "60"
    DIRECTAI_RATE_LIMIT_TPM: "100000"

  # Secret Store CSI — inject Key Vault secrets as env vars
  # Key Vault name and tenant ID are per-customer — override per deployment.
  secretStore:
    enabled: true
    keyVaultName: ""                  # Override: kvdai{hash}
    tenantId: "7dd8cf8b-3a69-4cb3-96c9-0a9e63fe6127"
    secrets:
      - objectName: database-url
        secretKey: DIRECTAI_DATABASE_URL
      - objectName: appinsights-connection-string
        secretKey: DIRECTAI_APPINSIGHTS_CONNECTION_STRING

  modelConfigDir: /app/models

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60

# ── Ingress — api.{customer}.agilecloud.ai ──────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"        # SSE streaming
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Production rate limiting — coarse per-IP (fine-grained per-key in middleware)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    nginx.ingress.kubernetes.io/limit-connections: "50"
  hosts:
    - host: api.agilecloud.ai        # Override per customer
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: directai-tls
      hosts:
        - api.agilecloud.ai          # Override per customer

# ── TLS — Let's Encrypt via cert-manager ──────────────────────────────────
tls:
  enabled: true
  certManager:
    enabled: true
    issuer: letsencrypt-prod

# ── Service Account (Workload Identity) ────────────────────────────────────
serviceAccount:
  create: true
  name: directai
  annotations: {}
  # Override per deployment:
  #   azure.workload.identity/client-id: "<kubelet-identity-client-id>"

workloadIdentity:
  enabled: true
  clientId: ""                        # Override per customer stamp

# ── Web Frontend — disabled on inference stamps ──────────────────────────
web:
  enabled: false

# ── Inference Backends ──────────────────────────────────────────────────────
# Production backends use vLLM for LLMs (BF16, auto HF download + NVMe cache).
# vLLM eliminates the TRT-LLM compile step — ship immediately when GPU quota lands.
# Migrate to TRT-LLM only for high-traffic models where compile ROI justifies it.
backends:

  # ── LLM — Llama 3.1 70B Instruct (vLLM, 2×A100 TP=2) ─────────────────
  # vLLM auto-downloads from HuggingFace. First pod startup ~10-20 min (140GB).
  # Subsequent starts use NVMe cache (seconds) if node stays warm.
  # TP=2 across 2 A100 GPUs on same node via NVLink.
  llama-3-1-70b-instruct:
    image: "vllm/vllm-openai:v0.16.0"
    imagePullPolicy: IfNotPresent
    modality: chat
    replicas: 1
    port: 8001
    args:
      - "--model"
      - "meta-llama/Llama-3.1-70B-Instruct"
      - "--served-model-name"
      - "llama-3.1-70b-instruct"
      - "--port"
      - "8001"
      - "--dtype"
      - "bfloat16"                    # A100 supports BF16 natively — no precision loss
      - "--max-model-len"
      - "8192"                        # 8K context — fits comfortably in 2×80GB
      - "--gpu-memory-utilization"
      - "0.90"
      - "--tensor-parallel-size"
      - "2"                           # TP=2 across 2 A100 GPUs on same node
      - "--disable-log-requests"
      - "--trust-remote-code"
      - "--enforce-eager"             # Disable CUDA graphs — simpler debugging, minor throughput tradeoff
    gpu:
      count: 2                        # 2× A100 80GB per replica
      nodePoolLabel: "a100"           # Matches directai.io/gpu-pool=a100 label
    resources:
      requests:
        cpu: "8"
        memory: 64Gi
      limits:
        cpu: "32"
        memory: 128Gi
    securityContext:
      readOnlyRootFilesystem: false   # vLLM writes to ~/.cache, ~/.triton, etc.
    modelCache:
      enabled: true
    cacheSize: "200Gi"                # 70B BF16 ≈ 140GB + tokenizer + overhead
    probes:
      liveness:
        path: /health
      readiness:
        path: /health
      startup:
        path: /health
        failureThreshold: 180         # 180 × 10s = 30 min for 140GB model download
    env:
      HF_HOME: "/model-cache/hf"
      VLLM_NO_USAGE_STATS: "1"
      VLLM_USAGE_SOURCE: "production"
      NCCL_DEBUG: "WARN"              # NVLink NCCL — bump to INFO for troubleshooting
    scaling:
      enabled: true
      minReplicas: 1                  # Always-warm — keeps node alive, NVMe cache hot
      maxReplicas: 4
      targetConcurrency: 8
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "a100"
        effect: "NoSchedule"

  # ── LLM — Qwen 2.5 3B Instruct (vLLM, 1×A100 — lightweight fast model) ─
  # Small model for low-latency simple tasks. Fits easily in a single A100.
  qwen2-5-3b-instruct:
    image: "vllm/vllm-openai:v0.16.0"
    imagePullPolicy: IfNotPresent
    modality: chat
    replicas: 1
    port: 8001
    args:
      - "--model"
      - "Qwen/Qwen2.5-3B-Instruct"
      - "--served-model-name"
      - "qwen2-5-3b-instruct"
      - "--port"
      - "8001"
      - "--dtype"
      - "bfloat16"
      - "--max-model-len"
      - "8192"
      - "--gpu-memory-utilization"
      - "0.50"                        # 3B BF16 ≈ 6GB — leave headroom for co-scheduling
      - "--disable-log-requests"
      - "--trust-remote-code"
    gpu:
      count: 1
      nodePoolLabel: "a100"
    resources:
      requests:
        cpu: "4"
        memory: 16Gi
      limits:
        cpu: "16"
        memory: 32Gi
    securityContext:
      readOnlyRootFilesystem: false
    modelCache:
      enabled: true
    cacheSize: "20Gi"
    probes:
      liveness:
        path: /health
      readiness:
        path: /health
      startup:
        path: /health
        failureThreshold: 60          # 60 × 10s = 10 min
    env:
      HF_HOME: "/model-cache/hf"
      VLLM_NO_USAGE_STATS: "1"
      VLLM_USAGE_SOURCE: "production"
    scaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetConcurrency: 16
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "a100"
        effect: "NoSchedule"

  # ── Embeddings — BGE-large-en-v1.5 (ONNX Runtime, A100) ──────────────
  # Runs on A100 initially. Move to dedicated A10G embeddings pool when provisioned.
  bge-large-en-v1-5:
    image: "acrplatformdaiv7fgid.azurecr.io/embeddings-engine:bge-baked"
    imagePullPolicy: IfNotPresent
    modality: embedding
    replicas: 2
    port: 8001
    gpu:
      count: 1
      nodePoolLabel: "a100"           # TODO: move to "embeddings" pool (A10G) when available
    resources:
      requests:
        cpu: "2"
        memory: 4Gi
      limits:
        cpu: "4"
        memory: 8Gi
    env:
      EMBED_LOG_LEVEL: "info"
      EMBED_MAX_BATCH_SIZE: "256"
      EMBED_EXECUTION_PROVIDER: "CUDAExecutionProvider"
    scaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetConcurrency: 64
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "a100"
        effect: "NoSchedule"

  # ── STT — Whisper Large v3 (TRT-LLM, A100) ────────────────────────────
  # Not MVP. Enable when TRT-LLM Whisper engine is compiled.
  # whisper-large-v3:
  #   image: "acrplatformdaiv7fgid.azurecr.io/trtllm-engine:whisper-latest"
  #   imagePullPolicy: IfNotPresent
  #   modality: transcription
  #   replicas: 1
  #   port: 8001
  #   gpu:
  #     count: 1
  #     nodePoolLabel: "a100"
  #   resources:
  #     requests:
  #       cpu: "4"
  #       memory: 16Gi
  #     limits:
  #       cpu: "8"
  #       memory: 32Gi
  #   nvmeCache:
  #     enabled: true
  #     sizeMi: 50000
  #   scaling:
  #     enabled: true
  #     minReplicas: 0
  #     maxReplicas: 4
  #     targetConcurrency: 4
  #   tolerations:
  #     - key: "nvidia.com/gpu"
  #       operator: "Equal"
  #       value: "a100"
  #       effect: "NoSchedule"

# ── Model Configs (API server model registry) ─────────────────────────────
# Inline model deployment YAMLs — mounted into API server at /app/models.
modelConfigs:
  llama-3.1-70b-instruct.yaml: |
    apiVersion: directai/v1
    kind: ModelDeployment
    metadata:
      name: llama-3-1-70b-instruct
    spec:
      displayName: "Meta Llama 3.1 70B Instruct"
      ownedBy: meta
      modality: chat
      engine:
        type: vllm
        image: "vllm/vllm-openai:v0.16.0"
      hardware:
        gpuSku: Standard_ND96asr_v4
        gpuCount: 2
        nvmeCacheEnabled: true
      scaling:
        tier: always-warm
        minReplicas: 1
        maxReplicas: 4
        targetConcurrency: 8
      api:
        aliases:
          - llama-3.1-70b-instruct
          - meta/llama-3.1-70b-instruct
          - meta-llama/Llama-3.1-70B-Instruct

  qwen2.5-3b-instruct.yaml: |
    apiVersion: directai/v1
    kind: ModelDeployment
    metadata:
      name: qwen2-5-3b-instruct
    spec:
      displayName: "Qwen 2.5 3B Instruct"
      ownedBy: qwen
      modality: chat
      engine:
        type: vllm
        image: "vllm/vllm-openai:v0.16.0"
      hardware:
        gpuSku: Standard_ND96asr_v4
        gpuCount: 1
        nvmeCacheEnabled: false
      scaling:
        tier: always-warm
        minReplicas: 1
        maxReplicas: 4
        targetConcurrency: 16
      api:
        aliases:
          - qwen2.5-3b-instruct
          - qwen/qwen2.5-3b-instruct
          - Qwen/Qwen2.5-3B-Instruct

  bge-large-en-v1.5.yaml: |
    apiVersion: directai/v1
    kind: ModelDeployment
    metadata:
      name: bge-large-en-v1-5
    spec:
      displayName: "BAAI BGE Large English v1.5"
      ownedBy: baai
      modality: embedding
      engine:
        type: onnxruntime
        image: "acrplatformdaiv7fgid.azurecr.io/embeddings-engine:bge-baked"
        maxBatchSize: 256
      hardware:
        gpuSku: Standard_ND96asr_v4
        gpuCount: 1
        nvmeCacheEnabled: false
      scaling:
        tier: always-warm
        minReplicas: 2
        maxReplicas: 8
        targetConcurrency: 64
      api:
        aliases:
          - bge-large-en-v1.5
          - baai/bge-large-en-v1.5

# ── Network Policy ─────────────────────────────────────────────────────────
networkPolicy:
  enabled: true

# ── KEDA — autoscaling for inference backends ──────────────────────────────
keda:
  enabled: true
  pollingInterval: 10                 # Faster scaling response in prod
  cooldownPeriod: 300

# ── Prometheus / monitoring ────────────────────────────────────────────────
prometheusRules:
  enabled: true                       # Enable alerting rules in prod

# ── Priority Class ─────────────────────────────────────────────────────────
priorityClass:
  enabled: true
  name: directai-inference
  value: 1000000

# ── NVMe init — enabled for A100/H100 nodes with local NVMe ──────────────
nvmeInit:
  enabled: true
  image: "alpine:3.20"
  nodeSelector:
    directai.io/pool: inference

# ── DCGM Exporter — GPU metrics in prod ──────────────────────────────────
dcgmExporter:
  enabled: true
  image:
    repository: nvcr.io/nvidia/k8s/dcgm-exporter
    tag: "3.3.8-3.6.0-ubuntu22.04"
    pullPolicy: IfNotPresent
  collectInterval: "15000"
  customMetrics: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  nodeSelector:
    directai.io/pool: inference
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
    - key: directai.io/workload
      operator: Exists
      effect: NoSchedule

# ── Datadog Integration — enable if Datadog Agent deployed ────────────────
datadogOtlp:
  enabled: false
  endpoint: "http://datadog-agent.datadog.svc.cluster.local:4317"
